name: NASA Live Stream

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'NASA YouTube live URL (e.g. https://www.youtube.com/watch?v=xxx)'
        required: true
        default: 'https://www.youtube.com/watch?v=uwXgcTc8oY8'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install -q yt-dlp

      - name: Debug with cookies
        env:
          SOURCE_URL: ${{ github.event.inputs.youtube_url }}
        run: |
          yt-dlp \
            --cookies /tmp/cookies.txt \
            --extractor-args "youtube:player_client=web" \
            --get-url \
            --verbose \
            "$SOURCE_URL"
