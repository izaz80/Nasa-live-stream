name: 6-Hour NASA Stream

on:
  workflow_dispatch: # Starts the stream when you click the button

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install ffmpeg -y

      - name: Start Streaming
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Official NASA TV Public Stream - No IP Lock, No Cookies needed
          NASA_URL="https://ntv1.akamaized.net/hls/live/2023528/NASA-NTV1-Public/master.m3u8"

          while true
          do
            echo "Starting NASA stream..."
            
            ffmpeg -re -thread_queue_size 1024 \
            -i "$NASA_URL" \
            -stream_loop -1 -i Audio01.mp3 \
            -i overlay.png \
            -filter_complex "[0:v][2:v] overlay=0:0:shortest=1 [outv]" \
            -map "[outv]" -map 1:a \
            -c:v libx264 -preset ultrafast -tune stillimage -b:v 2000k -maxrate 2500k -bufsize 4000k \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
            
            echo "Stream interrupted or finished. Restarting in 5 seconds..."
            sleep 5
          done
