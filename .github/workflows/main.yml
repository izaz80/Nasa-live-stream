name: NASA Live Restream

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'NASA YouTube live URL (e.g. https://www.youtube.com/watch?v=XXX)'
        required: true
        default: 'https://www.youtube.com/watch?v=uwXgcTc8oY8'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # Just under GitHub's 6hr limit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install -q yt-dlp

      - name: Get stream URL
        id: get_url
        env:
          YT_URL: 'https://www.youtube.com/watch?v=MuHIx2q0Wjs'
        run: |
          echo "=== yt-dlp version ==="
          yt-dlp --version
          
          echo "=== Listing available formats ==="
          yt-dlp --list-formats "$YT_URL" 2>&1 | head -40
          
          echo "=== Attempting URL extraction ==="
          STREAM_URL=$(yt-dlp \
            --no-warnings \
            --no-check-certificate \
            -f "best" \
            --get-url "$YT_URL" 2>&1)
          
          echo "Result: $STREAM_URL"
          
          if echo "$STREAM_URL" | grep -q "http"; then
            CLEAN_URL=$(echo "$STREAM_URL" | grep "^http" | head -1)
            echo "stream_url=$CLEAN_URL" >> $GITHUB_OUTPUT
            echo "SUCCESS"
          else
            echo "FAILED - see output above for reason"
            exit 1
          fi
      - name: Stream to YouTube
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          STREAM_URL="${{ steps.get_url.outputs.stream_url }}"
          RTMP_URL="rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          
          # Retry loop — yt-dlp re-fetches a fresh URL on each reconnect
          # so the IP-lock is always valid
          while true; do
            echo "$(date): Refreshing stream URL..."
            
            STREAM_URL=$(yt-dlp \
              --no-warnings \
              -f "best[height<=720][protocol=m3u8_native]/best[protocol=m3u8_native]/best" \
              --get-url "${{ github.event.inputs.youtube_url }}" 2>/dev/null | head -1)

            if [ -z "$STREAM_URL" ]; then
              echo "Could not get URL, retrying in 10s..."
              sleep 10
              continue
            fi

            echo "$(date): Starting FFmpeg..."

            ffmpeg -hide_banner -loglevel warning \
              -re \
              -fflags +nobuffer+discardcorrupt \
              -i "$STREAM_URL" \
              -stream_loop -1 -i "Audio01.mp3" \
              -i "overlay.png" \
              -filter_complex "
                [0:v]fps=30,scale=1280:720,setpts=PTS-STARTPTS[bg];
                [2:v]scale=1280:720[fg];
                [bg][fg]overlay=0:0:shortest=1[outv]
              " \
              -map "[outv]" \
              -map "1:a" \
              -c:v libx264 \
              -preset ultrafast \
              -tune zerolatency \
              -pix_fmt yuv420p \
              -b:v 2500k -maxrate 2500k -bufsize 5000k \
              -c:a aac -b:a 128k -ar 44100 \
              -g 60 -r 30 \
              -f flv "$RTMP_URL"

            echo "$(date): FFmpeg exited. Reconnecting in 5s..."
            sleep 5
          done
