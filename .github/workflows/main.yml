name: 6-Hour NASA Stream - Final Boss Edition

on:
  workflow_dispatch:
    inputs:
      phone_tunnel_url:
        description: 'Paste your Serveo link (https://xxx.serveousercontent.com)'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install ffmpeg -y

      - name: Start Streaming
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          TUNNEL_URL: ${{ github.event.inputs.phone_tunnel_url }}
        run: |
          while true
          do
            echo "Opening data pipe from phone tunnel..."
            
            # -headers is used to skip the Serveo warning page
            # -blocksize helps stabilize the connection from your village ISP
            ffmpeg -re -blocksize 1048576 \
            -headers "Bypass-Tunnel-Reminder: true" \
            -i "$TUNNEL_URL" \
            -stream_loop -1 -i Audio01.mp3 \
            -i overlay.png \
            -filter_complex "[0:v][2:v] overlay=0:0:shortest=1 [outv]" \
            -map "[outv]" -map 1:a \
            -c:v libx264 -preset ultrafast -tune stillimage -b:v 2000k \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
            
            echo "Pipe interrupted. Reconnecting in 10s..."
            sleep 10
          done
