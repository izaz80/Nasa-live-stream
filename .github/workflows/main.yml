name: 6-Hour NASA Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install "The Brain"
        run: |
          sudo apt update
          sudo apt install ffmpeg nodejs -y # Nodejs solves the YouTube puzzles
          python3 -m pip install -U yt-dlp  # Ensures latest security bypass

      - name: Create Cookie File
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Start Streaming
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          YOUTUBE_URL="https://www.youtube.com/watch?v=zPH5KtjJFaQ"
          
          while true
          do
            echo "Fetching URL using Cookies..."
            # Added --cookies so YouTube thinks it is YOUR browser
            NASA_URL=$(yt-dlp --cookies cookies.txt -g -f "best[height<=720]" "$YOUTUBE_URL")

            ffmpeg -re -i "$NASA_URL" \
            -stream_loop -1 -i Audio01.mp3 \
            -i overlay.png \
            -filter_complex "[0:v][2:v] overlay=0:0:shortest=1 [outv]" \
            -map "[outv]" -map 1:a \
            -c:v libx264 -preset ultrafast -tune stillimage -b:v 2000k \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
            
            sleep 5
          done
