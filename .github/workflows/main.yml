name: NASA Live Restream

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'NASA YouTube live URL'
        required: true
        default: 'https://www.youtube.com/watch?v=MuHIx2q0Wjs'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg nodejs npm curl
          
          # Install latest yt-dlp binary directly (more up to date than pip)
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install PO Token provider
        run: |
          # Install yt-dlp plugin interface
          pip3 install -q yt-dlp-get-pot

          # Correct package name (was renamed)
          npm install -g @imputnet/bgutil-ytdlp-pot-provider

          echo "=== Verify ==="
          npm list -g --depth=0
          
      - name: Test stream extraction
        id: get_url
        run: |
          echo "=== Attempting extraction with PO Token ==="
          
          STREAM_URL=$(yt-dlp \
            --no-warnings \
            --extractor-args "youtube:player_client=web;po_token=web+${POT}" \
            -f "best[height<=720][protocol=m3u8_native]/best[protocol=m3u8_native]/best" \
            --get-url \
            "${{ github.event.inputs.youtube_url }}" 2>&1)

          echo "Raw result: ${STREAM_URL:0:150}..."

          if echo "$STREAM_URL" | grep -q "^http"; then
            CLEAN_URL=$(echo "$STREAM_URL" | grep "^http" | head -1)
            echo "stream_url=$CLEAN_URL" >> $GITHUB_OUTPUT
            echo "SUCCESS"
          else
            echo "FAILED: $STREAM_URL"
            exit 1
          fi

      - name: Stream to YouTube
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          RTMP_URL="rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

          while true; do
            echo "$(date): Refreshing stream URL..."

            STREAM_URL=$(yt-dlp \
              --no-warnings \
              -f "best[height<=720][protocol=m3u8_native]/best[protocol=m3u8_native]/best" \
              --get-url \
              "${{ github.event.inputs.youtube_url }}" 2>/dev/null | head -1)

            if [ -z "$STREAM_URL" ]; then
              echo "Could not get URL, retrying in 10s..."
              sleep 10
              continue
            fi

            echo "$(date): Starting FFmpeg..."

            ffmpeg -hide_banner -loglevel warning \
              -re \
              -fflags +nobuffer+discardcorrupt \
              -i "$STREAM_URL" \
              -stream_loop -1 -i "Audio01.mp3" \
              -i "overlay.png" \
              -filter_complex "
                [0:v]fps=30,scale=1280:720,setpts=PTS-STARTPTS[bg];
                [2:v]scale=1280:720[fg];
                [bg][fg]overlay=0:0:shortest=1[outv]
              " \
              -map "[outv]" \
              -map "1:a" \
              -c:v libx264 \
              -preset ultrafast \
              -tune zerolatency \
              -pix_fmt yuv420p \
              -b:v 2500k -maxrate 2500k -bufsize 5000k \
              -c:a aac -b:a 128k -ar 44100 \
              -g 60 -r 30 \
              -f flv "$RTMP_URL"

            echo "$(date): FFmpeg dropped. Reconnecting in 5s..."
            sleep 5
          done
