name: NASA Live Restream

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'NASA YouTube live URL'
        required: true
        default: 'https://www.youtube.com/watch?v=MuHIx2q0Wjs'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install streamlink
          streamlink --version

      - name: Test extraction
        run: |
          echo "=== Testing streamlink extraction ==="
          streamlink \
            --loglevel debug \
            --stream-url \
            "${{ github.event.inputs.youtube_url }}" \
            best 2>&1 | tail -20

      - name: Stream to YouTube
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          RTMP_URL="rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          YT_URL="${{ github.event.inputs.youtube_url }}"

          while true; do
            echo "$(date): Getting stream URL via streamlink..."

            STREAM_URL=$(streamlink \
              --stream-url \
              "$YT_URL" \
              best 2>/dev/null)

            if [ -z "$STREAM_URL" ]; then
              echo "streamlink failed, retrying in 15s..."
              sleep 15
              continue
            fi

            echo "$(date): Got URL, starting FFmpeg..."

            ffmpeg -hide_banner -loglevel warning \
              -re \
              -fflags +nobuffer+discardcorrupt \
              -i "$STREAM_URL" \
              -stream_loop -1 -i "Audio01.mp3" \
              -i "overlay.png" \
              -filter_complex "
                [0:v]fps=30,scale=1280:720,setpts=PTS-STARTPTS[bg];
                [2:v]scale=1280:720[fg];
                [bg][fg]overlay=0:0:shortest=1[outv]
              " \
              -map "[outv]" \
              -map "1:a" \
              -c:v libx264 \
              -preset ultrafast \
              -tune zerolatency \
              -pix_fmt yuv420p \
              -b:v 2500k -maxrate 2500k -bufsize 5000k \
              -c:a aac -b:a 128k -ar 44100 \
              -g 60 -r 30 \
              -f flv "$RTMP_URL"

            echo "$(date): FFmpeg dropped. Reconnecting in 5s..."
            sleep 5
          done
