name: 6-Hour NASA Stream

on:
  workflow_dispatch: # Allows manual start

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install ffmpeg -y
          pip install yt-dlp

      - name: Start Streaming
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          NASA_URL=$(yt-dlp -g -f "best[height<=720]" "https://www.youtube.com/watch?v=zPH5KtjJFaQ")
          
          ffmpeg -re -i "$NASA_URL" \
          -stream_loop -1 -i Audio01.mp3 \
          -i overlay.png \
          -filter_complex "[0:v][2:v] overlay=0:0:shortest=1 [outv]" \
          -map "[outv]" -map 1:a \
          -c:v libx264 -preset ultrafast -tune stillimage -b:v 2000k \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
