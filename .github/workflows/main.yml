name: NASA Live Stream - Nuclear Edition

on:
  workflow_dispatch:
    inputs:
      phone_tunnel_url:
        description: 'Paste your Serveo link'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install ffmpeg -y

      - name: Start Streaming
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          TUNNEL_URL: ${{ github.event.inputs.phone_tunnel_url }}
        run: |
          while true
          do
            echo "Forcing Live Stream Synchronization..."
            
            # 1. We remove -stream_loop from the video input to prevent the 9-hour jump
            # 2. We use -fflags +nobuffer to prevent GitHub from 'speeding up'
            # 3. We use -shortest to ensure the stream stays synced to the video
            ffmpeg -hide_banner -re \
            -headers "Bypass-Tunnel-Reminder: true" \
            -fflags +genpts+igndts+nobuffer \
            -f mpegts \
            -i "$TUNNEL_URL/video.ts" \
            -stream_loop -1 -i Audio01.mp3 \
            -i overlay.png \
            -filter_complex "[0:v]scale=1280:720,setpts=PTS-STARTPTS[bg]; [2:v]scale=1280:720[fg]; [bg][fg]overlay=0:0:shortest=1[outv]" \
            -map "[outv]" -map 1:a \
            -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p \
            -b:v 2500k -minrate 2500k -maxrate 2500k -bufsize 5000k \
            -c:a aac -b:a 128k -ar 44100 \
            -g 60 -r 30 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

            echo "Bridge dropped. Retrying in 5s..."
            sleep 5
          done
