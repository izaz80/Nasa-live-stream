name: NASA Live Stream - Master Edition

on:
  workflow_dispatch:
    inputs:
      phone_tunnel_url:
        description: 'Paste your Serveo link'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install ffmpeg -y

      - name: Start Streaming
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          TUNNEL_URL: ${{ github.event.inputs.phone_tunnel_url }}
        run: |
          while true
          do
            echo "Forcing Wallclock Sync..."
            
            # 1. -fflags +genpts+igndts: Throws away the '01:11:14' time and starts at 0
            # 2. -use_wallclock_as_timestamps 1: Forces the stream to follow GitHub's clock
            # 3. -thread_queue_size 1024: Prevents the 'Speed=75x' by buffering the input
            ffmpeg -hide_banner \
            -headers "Bypass-Tunnel-Reminder: true" \
            -fflags +genpts+igndts \
            -use_wallclock_as_timestamps 1 \
            -thread_queue_size 1024 \
            -i "$TUNNEL_URL/video.ts" \
            -stream_loop -1 -i Audio01.mp3 \
            -i overlay.png \
            -filter_complex "[0:v][2:v] overlay=0:0:shortest=1 [outv]" \
            -map "[outv]" -map 1:a \
            -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p \
            -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -c:a aac -b:a 128k -ar 44100 \
            -g 60 -r 30 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

            echo "Sync lost. Re-establishing bridge..."
            sleep 3
          done
