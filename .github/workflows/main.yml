name: NASA Live Restream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip3 install -q yt-dlp

      - name: Stream to YouTube
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          RTMP_URL="rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

          while true; do
            echo "$(date): Fetching URL from Gist..."

            STREAM_URL=$(curl -s \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/gists/$GIST_ID" \
              | python3 -c "
import sys,json
data=json.load(sys.stdin)
print(data['files']['stream_url.txt']['content'].strip())
")

            if [ -z "$STREAM_URL" ]; then
              echo "Could not read Gist, retrying in 15s..."
              sleep 15
              continue
            fi

            echo "$(date): Got URL, starting FFmpeg..."

            ffmpeg -hide_banner -loglevel warning \
              -re \
              -fflags +nobuffer+discardcorrupt \
              -i "$STREAM_URL" \
              -stream_loop -1 -i "Audio01.mp3" \
              -i "overlay.png" \
              -filter_complex "
                [0:v]scale=1280:720,fps=24[bg];
                [2:v]scale=200:-1[wm];
                [bg][wm]overlay=W-w-10:10[outv]
              " \
              -map "[outv]" \
              -map "1:a" \
              -c:v libx264 \
              -preset ultrafast \
              -tune zerolatency \
              -pix_fmt yuv420p \
              -b:v 1500k -maxrate 1500k -bufsize 3000k \
              -c:a aac -b:a 96k -ar 44100 \
              -g 48 -r 24 \
              -f flv "$RTMP_URL"

            echo "$(date): FFmpeg dropped. Re-fetching URL in 5s..."
            sleep 5
          done
