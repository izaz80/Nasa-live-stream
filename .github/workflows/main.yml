name: NASA Live Stream - Frame-Blaster Edition

on:
  workflow_dispatch:
    inputs:
      phone_tunnel_url:
        description: 'Paste your Serveo link'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install ffmpeg -y

      - name: Start Streaming
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          TUNNEL_URL: ${{ github.event.inputs.phone_tunnel_url }}
        run: |
          while true
          do
            echo "Blasting frames to YouTube..."
            
            # -fflags +nobuffer +genpts +igndts: Prevents the time-skip and data-clogging
            # -r 30: Forces the output to be 30fps regardless of input
            ffmpeg -hide_banner -re \
            -headers "Bypass-Tunnel-Reminder: true" \
            -fflags +genpts+igndts+nobuffer \
            -i "$TUNNEL_URL/video.ts" \
            -stream_loop -1 -i Audio01.mp3 \
            -i overlay.png \
            -filter_complex "[0:v]fps=30,scale=1280:720,setpts=PTS-STARTPTS[bg]; [2:v]scale=1280:720[fg]; [bg][fg]overlay=0:0:shortest=1[outv]" \
            -map "[outv]" -map 1:a \
            -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p \
            -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -c:a aac -b:a 128k -ar 44100 \
            -g 60 -r 30 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

            echo "Sync lost. Restarting bridge..."
            sleep 5
          done
