name: 6-Hour NASA Stream - Final Boss Edition

on:
  workflow_dispatch:
    inputs:
      phone_tunnel_url:
        description: 'Paste your Serveo link (https://xxx.serveousercontent.com)'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install ffmpeg -y

      - name: Start Streaming
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          TUNNEL_URL: ${{ github.event.inputs.phone_tunnel_url }}
        run: |
          while true
          do
            echo "Receiving Clean Pipe..."
            
            # -probesize and -analyzeduration give FFmpeg time to understand the video
            ffmpeg -re \
            -headers "Bypass-Tunnel-Reminder: true" \
            -probesize 10M -analyzeduration 10M \
            -i "$TUNNEL_URL" \
            -stream_loop -1 -i Audio01.mp3 \
            -i overlay.png \
            -filter_complex "[0:v][2:v] overlay=0:0:shortest=1 [outv]" \
            -map "[outv]" -map 1:a \
            -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p -b:v 2500k \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
            
            sleep 5
          done
